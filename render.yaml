# render.yaml
services:
  - type: web
    name: agri-recommend-api
    env: python
    region: frankfurt  # أقرب للجزائر
    buildCommand: |
      python -m pip install --upgrade pip wheel setuptools
      python -m pip install --no-cache-dir --only-binary :all: -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"          # ← مفتاح الحل: إصدار مستقر
      - key: PIP_NO_CACHE_DIR
        value: "1"
      - key: PIP_PREFER_BINARY
        value: "1"
      - key: FASTAPI_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true