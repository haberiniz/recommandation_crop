services:
  - type: web
    name: agri-recommend-api
    env: python
    region: frankfurt  # أقرب منطقة للجزائر
    buildCommand: ""
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FASTAPI_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true