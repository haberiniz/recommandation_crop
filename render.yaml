# render.yaml
services:
  - type: web
    name: agri-recommend-api
    env: python
    region: frankfurt
    buildCommand: |
      pip install --upgrade pip
      pip install --only-binary :all: -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PIP_NO_CACHE_DIR
        value: "1"
      - key: PIP_PREFER_BINARY
        value: "1"
      - key: FASTAPI_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true